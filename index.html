    <style>
        :root {
            --bg-site: #F8FAFC;
            --bg-card: #FFFFFF;

            --dourado: #C5A059; 
            --dourado-hover: #A3803B;
            --whatsapp: #25D366;
            --texto-escuro: #1E293B;
            --texto-suave: #64748B;
            --borda: #E2E8F0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body {
            background-color: var(--bg-site);
            color: var(--texto-escuro);
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 { font-family: 'Cinzel', serif; font-weight: 800; color: var(--azul-profundo); }
        a { text-decoration: none; color: inherit; }

        .wrap { max-width: 1120px; margin: 0 auto; padding: 0 24px; }

        /* HEADER */
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--borda); padding: 20px 0;
            box-shadow: 0 4px 30px rgba(9, 21, 36, 0.02);
        }
        header .wrap { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; }
        .logo span { color: var(--dourado); }
        
        .btn-header {
            background: var(--azul-profundo); color: white; border: none;
            padding: 10px 22px; border-radius: 4px; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-header:hover { background: var(--dourado); }

        /* HERO PRINCIPAL */
        .hero { padding: 180px 0 90px; background: linear-gradient(180deg, #FFFFFF 0%, var(--bg-site) 100%); }
        .hero-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 56px; align-items: center; }
        .eyebrow { color: var(--dourado); font-size: 0.8rem; font-weight: 700; letter-spacing: 3px; margin-bottom: 16px; text-transform: uppercase; }
        .hero h1 { font-size: clamp(2.2rem, 4.5vw, 3.4rem); line-height: 1.2; margin-bottom: 24px; }
        .hero h1 span { color: var(--dourado); font-weight: 600; }
        .hero p { color: var(--texto-suave); font-size: 1.05rem; margin-bottom: 36px; max-width: 500px; }

        .funnel-container { max-width: 800px; margin: 0 auto; background: var(--bg-site); border: 1px solid var(--borda); border-radius: 12px; overflow: hidden; box-shadow: 0 15px 40px rgba(9, 21, 36, 0.04); }
